title: Openzeka White Papers
description: >-
  Openzeka Teknoloji A.Ş. technical white papers — NVIDIA DGX/HGX, Jetson embedded
  systems, Cordatus AI edge-cloud inference platform, real-time video analytics
  and digital twin solutions.

url: "https://openzeka.github.io"
baseurl: "/white-papers"

# Çok dilli (i18n) — jekyll-polyglot
# EN root'ta varsayılan, TR /tr/ altında
lang: en
languages: ["en", "tr"]
default_lang: "en"
exclude_from_localization: ["javascript", "images", "css", "assets", "_sass", "CNAME"]
parallel_localization: true
sass:
  sourcemap: never

# Tema (CI'da Gemfile'daki gem ile yüklenir)
theme: just-the-docs

# Site kimliği
logo: "/assets/images/openzeka-logo.png"

# Arama
search_enabled: true
search:
  heading_level: 3
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Navigasyon
nav_sort: order
nav_fold: true

back_to_top: true

# Üstteki yardımcı bağlantılar
aux_links:
  "openzeka.com": "https://www.openzeka.com"
  "Cordatus AI": "https://cordatus.ai/"
  "GitHub": "https://github.com/openzeka"
aux_links_new_tab: true

# Tema rengi (Openzeka marka yeşili)
color_scheme: openzeka

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  parse_block_html: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Eklentiler
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-polyglot

# Hariç tutulan dosyalar
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
  - README.md
  - DEVELOPMENT.md
  - LICENSE
  - Makefile

# SEO
twitter:
  username: openzeka
  card: summary_large_image
